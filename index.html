<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my sweetie</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      background: url('bg.jpg') center/cover no-repeat fixed; /* Background utama */
      color: #333; /* Teks warna gelap */
      text-align: center;
    }

    /* overlay pink */
    .overlay {
      background: rgba(255, 182, 193, 0.35);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* judul */
    h1 {
      font-family: 'Pacifico', cursive;
      color: #ff69b4;
      font-size: 42px;
    }

    /* kotak teks */
    .card {
      background: rgba(255,255,255,0.25); /* transparan */
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      max-width: 700px;
      margin: auto;
    }

    /* hiasan */
    .decor {
      position: fixed;
      width: 80px;
    }

    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }

    p {
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-line;
    }

  </style>
</head>

<body>

  <!-- Hiasan -->
  <img src="hias1.png" class="decor top-left">
  <img src="hias2.png" class="decor top-right">
  <img src="hias3.png" class="decor bottom-left">
  <img src="hias4.png" class="decor bottom-right">

  <div class="overlay">

    <h1>my sweetie 💗</h1>

    <div class="card">
      <p id="text"></p>
    </div>

  </div>

  <script>
    const text = `hallow •ᴗ•

    kita ex sekarang, i really miss youu… tapi kita berdua sama-sama gak bisa kalau bersama.

    aku mau perbaikin hidupku dan dewasain sifatku. aku selalu gak ngerti gimana caranya supaya aku bisa penuhin kamu dengan perasaan kasih sayang, karena aku gak pernah dapet itu dari keluarga aku. maafin aku ya yang aneh gini…

    aku mohon jangan hapus chat kita, jangan hapus kenangannya. kamu orang paling manis, kamu perlakuin aku dengan baik. mungkin ada beberapa yang nyakitin perasaanku, tapi aku udah mulai lupain semuanya.

    aku mau berhenti hubungan ini karena aku capek sama pikiranku sendiri. kamu orang paling baik yang pernah aku temuin, dari awalnya orang asing… aku terlalu sakit, terlalu banyak masalah keluarga, sampai aku lupa ngasih kamu hal terbaik yang aku punya. makanya aku mau perbaiki diri jadi lebih baik dari aku yang sekarang.

    jangan musuhin atau benci aku ya… maaf kemarin aku cuma butuh direspon pakai emotional support, bukan logika. aku tahu kamu kadang kesel dan capek sama aku, apalagi soal aku yang masih minjemin uang ke mama papa… tapi waktu itu aku lagi depresi banget, aku cuma pengen didukung secara emosi.

    aku berharap kamu gak ganti semua sosmed kamu… maafin aku. aku harus bikin diriku ngerasa cukup dulu. di masa depan nanti, kamu mau gak temenan sama aku? kalau gak mau, gapapa…

    aku juga berharap kamu punya pasangan yang lebih baik dari aku. dan aku berharap kamu tetap jadi kamu yang baik, gak terlalu ngatur, dan gak nyakitin orang lain lagi.

    makasih banyak untuk kado ulang tahunnya… maaf hubungan kita selesai padahal beberapa hari lagi aku ulang tahun. jangan dibuang ya, simpan aja… maaf kalau aku kelihatan gak menghargai.

    aku berharap nanti kita masih bisa temenan tanpa perasaan yang mendalam, tanpa rasa sakit juga…

    i love you.

    makasih udah jadi alasan aku tetap hidup selama ini. makasih juga udah hadir di hidupku yang hancur. makasih banyak udah penuhin banyak inner child aku…

    aku seneng banget kamu panggil aku “dede”… rasanya semua masalah aku hilang, aku bisa lupa sebentar sama semua yang lagi aku alamin.

    makasih banyak udah bikin aku jadi anak kecil paling bahagia, di saat semua orang maksa aku jadi tulang punggung keluarga.`;

    let i = 0;
    function typing() {
      if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 25); // Kecepatan ketik
      }
    }
    typing();
  </script>

</body>
</html>
